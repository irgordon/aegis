name: Draft Release Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AEGIS_DRAFT_VERSION: v0.4.1

jobs:
  macos-draft-artifacts:
    name: Draft macOS artifact (${{ matrix.platform }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            rust_target: aarch64-apple-darwin
            archive_name: aegis-v0.4.1-macos-arm64.tar.gz
          - platform: macos-x64
            rust_target: x86_64-apple-darwin
            archive_name: aegis-v0.4.1-macos-x64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.rust_target }}

      - name: Run repository verifier
        run: python3 scripts/verify.py

      - name: Check gateway formatting
        run: cargo fmt --check

      - name: Run gateway lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run gateway tests
        run: cargo test

      - name: Check desktop formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run desktop lints
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run desktop tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check desktop crate
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Configure draft release path remapping
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}=. --remap-path-prefix=${HOME}=~ --remap-path-prefix=${RUNNER_TEMP}=."
            echo "CARGO_PROFILE_RELEASE_DEBUG=false"
            echo "CARGO_PROFILE_RELEASE_STRIP=debuginfo"
          } >> "${GITHUB_ENV}"

      - name: Build gateway binary
        run: cargo build --release --bin aegis-gateway --target "${{ matrix.rust_target }}"

      - name: Build desktop binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --target "${{ matrix.rust_target }}"

      - name: Assemble draft artifact
        shell: bash
        run: |
          set -euo pipefail

          base="aegis-${AEGIS_DRAFT_VERSION}-${{ matrix.platform }}"
          archive="${{ matrix.archive_name }}"
          staging="dist/${base}"

          rm -rf dist
          policy_bundle="${staging}/policy-bundles/local-dev"

          mkdir -p "${staging}/bin" "${staging}/desktop"
          mkdir -p "${policy_bundle}/checksums" "${policy_bundle}/signatures"

          cp "target/${{ matrix.rust_target }}/release/aegis-gateway" "${staging}/bin/aegis-gateway"
          cp "src-tauri/target/${{ matrix.rust_target }}/release/aegis-desktop" "${staging}/desktop/aegis-desktop"
          cp "docs/releases/artifact-readme-v0.4.1.md" "${staging}/README.md"
          cp "examples/policy-bundles/local-dev/manifest.yaml" "${policy_bundle}/manifest.yaml"
          cp "examples/policy-bundles/local-dev/gateway_policy.yaml" "${policy_bundle}/gateway_policy.yaml"
          cp "examples/policy-bundles/local-dev/risk_matrix.yaml" "${policy_bundle}/risk_matrix.yaml"
          cp "examples/policy-bundles/local-dev/checksums/SHA256SUMS" "${policy_bundle}/checksums/SHA256SUMS"
          cp "examples/policy-bundles/local-dev/signatures/public.pem" "${policy_bundle}/signatures/public.pem"
          cp "examples/policy-bundles/local-dev/signatures/SHA256SUMS.sig" "${policy_bundle}/signatures/SHA256SUMS.sig"

          cat > "${staging}/ARTIFACT-CONTENTS.md" <<'CONTENTS'
          # Artifact Contents

          This draft archive contains the AEGIS gateway binary and the desktop binary build output.
          It also contains the verified local development policy bundle used by fixed health-check evidence.

          This workflow produces GitHub Actions workflow artifacts for inspection only.
          It does not publish a GitHub Release.
          CONTENTS

          tar -czf "dist/${archive}" -C dist "${base}"

      - name: Verify draft artifact names
        shell: bash
        run: |
          set -euo pipefail
          test -s "dist/${{ matrix.archive_name }}"

      - name: Upload draft workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: draft-${{ matrix.platform }}-v0.4.1
          if-no-files-found: error
          path: dist/${{ matrix.archive_name }}

  combined-draft-artifacts:
    name: Combined draft artifact checksums
    runs-on: macos-latest
    needs: macos-draft-artifacts

    steps:
      - name: Download draft archive artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: draft-macos-*-v0.4.1
          path: dist/combined
          merge-multiple: true

      - name: Generate combined SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail

          cd dist/combined

          expected_archives=(
            "aegis-v0.4.1-macos-arm64.tar.gz"
            "aegis-v0.4.1-macos-x64.tar.gz"
          )

          for archive in "${expected_archives[@]}"; do
            test -s "${archive}"
          done

          find . -maxdepth 1 -name 'aegis-v0.4.1-*.tar.gz' -print | sort > archives.txt

          expected_count="${#expected_archives[@]}"
          actual_count="$(wc -l < archives.txt | tr -d ' ')"
          test "${actual_count}" -eq "${expected_count}"

          : > SHA256SUMS
          while IFS= read -r archive_path; do
            archive="${archive_path#./}"
            shasum -a 256 "${archive}" >> SHA256SUMS
          done < archives.txt

          shasum -a 256 -c SHA256SUMS

          while IFS= read -r archive_path; do
            archive="${archive_path#./}"
            grep -F "  ${archive}" SHA256SUMS
          done < archives.txt

      - name: Upload combined draft workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: draft-artifacts-v0.4.1
          if-no-files-found: error
          path: |
            dist/combined/aegis-v0.4.1-*.tar.gz
            dist/combined/SHA256SUMS
