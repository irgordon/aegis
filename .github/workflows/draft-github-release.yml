name: Draft GitHub Release

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AEGIS_RELEASE_VERSION: v0.4.1
  AEGIS_RELEASE_TITLE: AEGIS v0.4.1 Developer Preview

jobs:
  macos-release-assets:
    name: Build draft release asset (${{ matrix.platform }})
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            rust_target: aarch64-apple-darwin
            archive_name: aegis-v0.4.1-macos-arm64.tar.gz
          - platform: macos-x64
            rust_target: x86_64-apple-darwin
            archive_name: aegis-v0.4.1-macos-x64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Require workflow ref to match v0.4.1 tag
        shell: bash
        run: |
          set -euo pipefail

          git ls-remote --exit-code --tags origin "refs/tags/${AEGIS_RELEASE_VERSION}" > /dev/null

          if ! git show-ref --verify --quiet "refs/tags/${AEGIS_RELEASE_VERSION}"; then
            git fetch --no-tags origin "refs/tags/${AEGIS_RELEASE_VERSION}:refs/tags/${AEGIS_RELEASE_VERSION}"
          fi

          tag_sha="$(git rev-parse "${AEGIS_RELEASE_VERSION}^{commit}")"
          head_sha="$(git rev-parse HEAD)"

          if [ "${head_sha}" != "${tag_sha}" ]; then
            echo "::error::Run this workflow with --ref ${AEGIS_RELEASE_VERSION} after the maintainer-created tag exists."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.rust_target }}

      - name: Run repository verifier
        run: python3 scripts/verify.py

      - name: Check gateway formatting
        run: cargo fmt --check

      - name: Run gateway lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run gateway tests
        run: cargo test

      - name: Check desktop formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run desktop lints
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run desktop tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check desktop crate
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Configure draft release path remapping
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}=. --remap-path-prefix=${HOME}=~ --remap-path-prefix=${RUNNER_TEMP}=."
            echo "CARGO_PROFILE_RELEASE_DEBUG=false"
            echo "CARGO_PROFILE_RELEASE_STRIP=debuginfo"
          } >> "${GITHUB_ENV}"

      - name: Build gateway binary
        run: cargo build --release --bin aegis-gateway --target "${{ matrix.rust_target }}"

      - name: Build desktop binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --target "${{ matrix.rust_target }}"

      - name: Assemble draft release asset
        shell: bash
        run: |
          set -euo pipefail

          base="aegis-${AEGIS_RELEASE_VERSION}-${{ matrix.platform }}"
          archive="${{ matrix.archive_name }}"
          staging="dist/${base}"

          rm -rf dist
          policy_bundle="${staging}/policy-bundles/local-dev"

          mkdir -p "${staging}/bin" "${staging}/desktop"
          mkdir -p "${policy_bundle}/checksums" "${policy_bundle}/signatures"

          cp "target/${{ matrix.rust_target }}/release/aegis-gateway" "${staging}/bin/aegis-gateway"
          cp "src-tauri/target/${{ matrix.rust_target }}/release/aegis-desktop" "${staging}/desktop/aegis-desktop"
          cp "docs/releases/artifact-readme-v0.4.1.md" "${staging}/README.md"
          cp "examples/policy-bundles/local-dev/manifest.yaml" "${policy_bundle}/manifest.yaml"
          cp "examples/policy-bundles/local-dev/gateway_policy.yaml" "${policy_bundle}/gateway_policy.yaml"
          cp "examples/policy-bundles/local-dev/risk_matrix.yaml" "${policy_bundle}/risk_matrix.yaml"
          cp "examples/policy-bundles/local-dev/checksums/SHA256SUMS" "${policy_bundle}/checksums/SHA256SUMS"
          cp "examples/policy-bundles/local-dev/signatures/public.pem" "${policy_bundle}/signatures/public.pem"
          cp "examples/policy-bundles/local-dev/signatures/SHA256SUMS.sig" "${policy_bundle}/signatures/SHA256SUMS.sig"

          cat > "${staging}/ARTIFACT-CONTENTS.md" <<'CONTENTS'
          # Artifact Contents

          This draft archive contains the AEGIS gateway binary and the desktop binary build output.
          It also contains the verified local development policy bundle used by fixed health-check evidence.

          This archive may be attached to a draft GitHub Release for maintainer review.
          It does not publish AEGIS.
          CONTENTS

          tar -czf "dist/${archive}" -C dist "${base}"

      - name: Verify draft release asset name
        shell: bash
        run: |
          set -euo pipefail
          test -s "dist/${{ matrix.archive_name }}"

      - name: Upload draft release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: draft-release-${{ matrix.platform }}-v0.4.1
          if-no-files-found: error
          path: dist/${{ matrix.archive_name }}

  draft-github-release:
    name: Create draft GitHub Release
    runs-on: macos-latest
    needs: macos-release-assets
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require workflow ref to match v0.4.1 tag
        shell: bash
        run: |
          set -euo pipefail

          git ls-remote --exit-code --tags origin "refs/tags/${AEGIS_RELEASE_VERSION}" > /dev/null

          if ! git show-ref --verify --quiet "refs/tags/${AEGIS_RELEASE_VERSION}"; then
            git fetch --no-tags origin "refs/tags/${AEGIS_RELEASE_VERSION}:refs/tags/${AEGIS_RELEASE_VERSION}"
          fi

          tag_sha="$(git rev-parse "${AEGIS_RELEASE_VERSION}^{commit}")"
          head_sha="$(git rev-parse HEAD)"

          if [ "${head_sha}" != "${tag_sha}" ]; then
            echo "::error::Run this workflow with --ref ${AEGIS_RELEASE_VERSION} after the maintainer-created tag exists."
            exit 1
          fi

      - name: Download draft release assets
        uses: actions/download-artifact@v4
        with:
          pattern: draft-release-macos-*-v0.4.1
          path: dist/release-assets
          merge-multiple: true

      - name: Generate and verify combined SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail

          cd dist/release-assets

          expected_archives=(
            "aegis-v0.4.1-macos-arm64.tar.gz"
            "aegis-v0.4.1-macos-x64.tar.gz"
          )

          for archive in "${expected_archives[@]}"; do
            test -s "${archive}"
          done

          find . -maxdepth 1 -name 'aegis-v0.4.1-*.tar.gz' -print | sort > "${RUNNER_TEMP}/draft-release-archives.txt"

          expected_count="${#expected_archives[@]}"
          actual_count="$(wc -l < "${RUNNER_TEMP}/draft-release-archives.txt" | tr -d ' ')"
          test "${actual_count}" -eq "${expected_count}"

          : > SHA256SUMS
          while IFS= read -r archive_path; do
            archive="${archive_path#./}"
            shasum -a 256 "${archive}" >> SHA256SUMS
          done < "${RUNNER_TEMP}/draft-release-archives.txt"

          shasum -a 256 -c SHA256SUMS

          while IFS= read -r archive_path; do
            archive="${archive_path#./}"
            grep -F "  ${archive}" SHA256SUMS
          done < "${RUNNER_TEMP}/draft-release-archives.txt"

      - name: Validate release asset set
        shell: bash
        run: |
          set -euo pipefail

          cd dist/release-assets

          expected_assets=(
            "SHA256SUMS"
            "aegis-v0.4.1-macos-arm64.tar.gz"
            "aegis-v0.4.1-macos-x64.tar.gz"
          )

          printf "%s\n" "${expected_assets[@]}" | sort > "${RUNNER_TEMP}/expected-release-assets.txt"
          find . -maxdepth 1 -type f -print | sed 's#^\./##' | sort > "${RUNNER_TEMP}/actual-release-assets.txt"

          diff -u "${RUNNER_TEMP}/expected-release-assets.txt" "${RUNNER_TEMP}/actual-release-assets.txt"
          shasum -a 256 -c SHA256SUMS

      - name: Require existing v0.4.1 tag
        shell: bash
        run: |
          set -euo pipefail
          git ls-remote --exit-code --tags origin "refs/tags/${AEGIS_RELEASE_VERSION}"

      - name: Create or update draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_assets=(
            "dist/release-assets/aegis-v0.4.1-macos-arm64.tar.gz"
            "dist/release-assets/aegis-v0.4.1-macos-x64.tar.gz"
            "dist/release-assets/SHA256SUMS"
          )

          release_is_draft="${RUNNER_TEMP}/release-is-draft.txt"

          if gh release view "${AEGIS_RELEASE_VERSION}" --json isDraft --jq '.isDraft' > "${release_is_draft}" 2>/dev/null; then
            if [ "$(cat "${release_is_draft}")" != "true" ]; then
              echo "::error::Existing ${AEGIS_RELEASE_VERSION} release is not a draft; refusing to modify it."
              exit 1
            fi

            gh release edit "${AEGIS_RELEASE_VERSION}" \
              --draft \
              --prerelease \
              --latest=false \
              --title "${AEGIS_RELEASE_TITLE}" \
              --notes-file docs/releases/v0.4.1-draft-body.md

            existing_assets="${RUNNER_TEMP}/existing-release-assets.txt"
            gh release view "${AEGIS_RELEASE_VERSION}" --json assets --jq '.assets[].name' > "${existing_assets}"

            while IFS= read -r asset; do
              if [ -n "${asset}" ]; then
                gh release delete-asset "${AEGIS_RELEASE_VERSION}" "${asset}" --yes
              fi
            done < "${existing_assets}"

            gh release upload "${AEGIS_RELEASE_VERSION}" "${release_assets[@]}"
          else
            gh release create "${AEGIS_RELEASE_VERSION}" "${release_assets[@]}" \
              --verify-tag \
              --draft \
              --prerelease \
              --latest=false \
              --title "${AEGIS_RELEASE_TITLE}" \
              --notes-file docs/releases/v0.4.1-draft-body.md
          fi
