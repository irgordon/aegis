name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance-and-contracts:
    name: Governance and contract validation
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install check-jsonschema

      - name: Run repository verifier
        run: python scripts/verify.py

      - name: Run repository verifier unit tests
        run: python -m unittest discover -s tests -p 'test_verify.py'

      - name: Validate schema documents
        run: |
          for schema in schemas/*.schema.json; do
            echo "Validating schema document: ${schema}"
            python -m json.tool "${schema}" > /dev/null
            check-jsonschema --check-metaschema "${schema}"
          done

      - name: Validate schema examples
        run: |
          set -euo pipefail

          for schema in schemas/*.schema.json; do
            base="$(basename "${schema}" .schema.json)"
            valid="schemas/examples/valid/${base}.json"
            invalid="schemas/examples/invalid/${base}.json"

            echo "Validating valid example for ${base}"
            check-jsonschema --schemafile "${schema}" "${valid}"

            echo "Validating invalid example for ${base}"
            if check-jsonschema --schemafile "${schema}" "${invalid}" > /tmp/aegis-invalid-example.log 2>&1; then
              echo "FAIL: invalid example unexpectedly passed for ${base}"
              cat /tmp/aegis-invalid-example.log
              exit 1
            else
              echo "PASS: invalid example correctly rejected for ${base}"
            fi
          done

      - name: Scan for blocked markers
        run: |
          if grep -RInE '\b(TODO|TBD|FIXME|placeholder)\b' README.md CHANGELOG.md docs schemas scripts --exclude='verify.py'; then
            echo "Blocked marker found. Replace unresolved markers before merge."
            exit 1
          fi

      - name: Report validation success
        run: echo "AEGIS GitHub Actions validation passed."

  rust:
    name: Rust validation
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust lints
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --locked

  desktop:
    name: Desktop validation
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check desktop formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run desktop lints
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run desktop tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Check desktop crate
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml
