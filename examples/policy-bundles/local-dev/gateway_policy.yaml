policy_version: 0.1.0-local
rules:
  - id: allow_health_check_agent
    tool: health.check
    capability: L0
    actor_type: agent
    risk: local_l0_health_allow
  - id: allow_metrics_read_agent
    tool: metrics.read
    capability: L0
    actor_type: agent
    risk: local_l0_allow
  - id: allow_sandbox_note_write_agent
    tool: sandbox.note.write
    capability: L1
    actor_type: agent
    risk: local_l1_sandbox_allow
  - id: deny_email_send_agent
    tool: email.send
    capability: L1
    actor_type: agent
    risk: local_l1_deny
  - id: pending_deploy_prod_agent
    tool: deploy.prod
    capability: L2
    actor_type: agent
    risk: local_l2_pending
